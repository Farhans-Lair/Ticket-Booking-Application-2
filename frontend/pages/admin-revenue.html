<title>

href="/css/styles.css">

<body>

<h1>

Revenue Analytics Dashboard

</h1>


<!-- Navigation Buttons -->

<div>

<button id="backDashboardBtn">

Back To Dashboard

</button>


<button id="logoutBtn">

Logout

</button>

</div>

<hr>


<div id="revenue-list">

Loading...

</div>



<script src="/js/api.js"></script>

<script src="/js/admin-revenue.js"></script>


<script>

/*
Prevent browser back cache
(Admin security)
*/

window.addEventListener("pageshow", function (event) {

 if (event.persisted) {

  window.location.reload();

 }

});


/*
Navigation
*/

document
.getElementById("backDashboardBtn")
.addEventListener("click", () => {

 window.location.replace("/admin");

});


/*
Logout
*/

document
.getElementById("logoutBtn")
.addEventListener("click", () => {

 localStorage.clear();

 window.location.replace("/");

});

</script>


</body>

</html>
