<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Events</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    #category-filters { margin: 12px 0 20px; display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-btn {
      padding: 6px 16px; border: 2px solid #4f46e5; border-radius: 20px;
      background: white; color: #4f46e5; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s;
    }
    .cat-btn:hover, .cat-btn.active {
      background: #4f46e5; color: white;
    }
    .category-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      background: #e0e7ff; color: #4f46e5; font-size: 0.78rem;
      font-weight: 600; margin-bottom: 6px;
    }
    .event-card { margin-bottom: 12px; }
  </style>
</head>

<body>
  <h1>Available Events</h1>

  <button id="logoutBtn">Logout</button>
  <button onclick="goMyBookings()">My Bookings</button>

  <!-- Category Filter Buttons — populated by events.js -->
  <div id="category-filters"></div>

  <div id="events-list"></div>

  <script src="/js/api.js"></script>
  <script src="/js/events.js"></script>
</body>
</html>
