<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Events — TicketVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #f5c842; --gold-dark: #d4a520; --bg-deep: #0a0a14;
      --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.1);
      --text: #f0eee8; --text-muted: rgba(240,238,232,0.55);
      --accent: #7c6af7; --red: #f74a6a; --card: #13131f; --green: #22c55e;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 48px; background: rgba(10,10,20,0.95); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: var(--gold); text-decoration: none; }
    .nav-right  { display: flex; gap: 20px; align-items: center; }
    .nav-right a { color: var(--text-muted); text-decoration: none; font-size: 0.88rem; transition: color .2s; }
    .nav-right a:hover { color: var(--text); }
    .nav-right a.profile-link { color: var(--accent); }
    .btn-logout { background: none; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; transition: all .2s; }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* PAGE */
    .page { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

    /* ── HERO BANNER (Featured) ── */
    .featured-section { padding: 40px 0 32px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; }
    .section-title .badge { display: inline-block; background: var(--gold); color: #0a0a14; font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; vertical-align: middle; margin-left: 8px; letter-spacing: .5px; }
    .see-all { color: var(--accent); text-decoration: none; font-size: 0.85rem; }

    /* FEATURED CAROUSEL */
    .featured-carousel { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 8px; scroll-snap-type: x mandatory; scrollbar-width: none; }
    .featured-carousel::-webkit-scrollbar { display: none; }
    .featured-card { flex: 0 0 340px; scroll-snap-align: start; border-radius: 16px; overflow: hidden; background: var(--card); border: 1px solid var(--glass-border); cursor: pointer; transition: transform .25s, box-shadow .25s; position: relative; }
    .featured-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .featured-img { width: 100%; height: 190px; object-fit: cover; background: linear-gradient(135deg, #1a1a3e 0%, #2a1a5e 100%); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
    .featured-badge-overlay { position: absolute; top: 12px; left: 12px; background: var(--gold); color: #0a0a14; font-size: 0.68rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; letter-spacing: .5px; }
    .featured-body { padding: 16px 18px; }
    .featured-cat { font-size: 0.72rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .featured-title { font-weight: 700; font-size: 1rem; margin-bottom: 8px; line-height: 1.3; }
    .featured-meta  { font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; }
    .featured-price { color: var(--gold); font-weight: 700; }

    /* TRENDING SECTION */
    .trending-section { padding: 32px 0; border-top: 1px solid var(--glass-border); }
    .trending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .trending-card { background: var(--card); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: transform .2s, box-shadow .2s; display: flex; align-items: center; gap: 14px; }
    .trending-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .trending-rank { font-size: 1.5rem; font-weight: 900; color: var(--glass-border); min-width: 28px; text-align: center; }
    .trending-rank.top3 { color: var(--gold); }
    .trending-info .t-title { font-weight: 600; font-size: 0.92rem; margin-bottom: 4px; }
    .trending-info .t-meta  { font-size: 0.78rem; color: var(--text-muted); }
    .trending-price { margin-left: auto; color: var(--gold); font-weight: 700; font-size: 0.9rem; white-space: nowrap; }

    /* DIVIDER */
    .divider-line { border: none; border-top: 1px solid var(--glass-border); margin: 32px 0; }

    /* ALL EVENTS */
    .all-events-section { padding: 8px 0; }
    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; align-items: center; }
    .filter-bar input { flex: 1; min-width: 200px; padding: 10px 16px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text); font-size: 0.88rem; font-family: inherit; }
    .filter-bar input:focus { outline: none; border-color: var(--accent); }
    .filter-btn { padding: 9px 18px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 0.83rem; transition: all .2s; white-space: nowrap; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }
    .event-card  { background: var(--card); border: 1px solid var(--glass-border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .25s, box-shadow .25s; }
    .event-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.45); }
    .ev-img { width: 100%; height: 160px; object-fit: cover; background: linear-gradient(135deg, #1a1a3e, #2a2a5e); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .ev-body { padding: 16px; }
    .ev-cat  { font-size: 0.7rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .ev-cat .featured-star { color: var(--gold); }
    .ev-title { font-weight: 700; font-size: 0.97rem; margin-bottom: 8px; line-height: 1.3; }
    .ev-meta  { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 12px; }
    .ev-meta span { display: block; margin-bottom: 2px; }
    .ev-footer { display: flex; align-items: center; justify-content: space-between; }
    .ev-price  { color: var(--gold); font-weight: 700; font-size: 0.95rem; }
    .ev-tickets { font-size: 0.75rem; color: var(--text-muted); }
    .btn-book { padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn-book:hover { opacity: 0.85; }
    .btn-book:disabled { background: var(--glass); color: var(--text-muted); cursor: default; }
    .qty-input { width: 56px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 7px; background: var(--glass); color: var(--text); font-size: 0.82rem; text-align: center; margin-right: 6px; }
    .book-action { display: flex; align-items: center; }

    .loading { text-align: center; padding: 48px; color: var(--text-muted); }
    .empty   { text-align: center; padding: 48px; color: var(--text-muted); }
    .hidden  { display: none; }

    @media (max-width: 640px) {
      nav { padding: 14px 18px; }
      .featured-card { flex: 0 0 280px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">TicketVerse</a>
  <div class="nav-right">
    <a href="/my-bookings">My Bookings</a>
    <a href="/profile" class="profile-link">My Profile</a>
    <button class="btn-logout" id="logoutBtn">Log out</button>
  </div>
</nav>

<div class="page">

  <!-- ── FEATURED EVENTS ── -->
  <div class="featured-section" id="featuredSection">
    <div class="section-header">
      <div class="section-title">✦ Featured Events <span class="badge">HANDPICKED</span></div>
      <a class="see-all" href="#all-events">See all events ↓</a>
    </div>
    <div class="featured-carousel" id="featuredCarousel">
      <div class="loading">Loading featured events…</div>
    </div>
  </div>

  <!-- ── TRENDING EVENTS ── -->
  <div class="trending-section" id="trendingSection">
    <div class="section-header">
      <div class="section-title">🔥 Trending This Month</div>
    </div>
    <div class="trending-grid" id="trendingGrid">
      <div class="loading">Loading trending events…</div>
    </div>
  </div>

  <hr class="divider-line" />

  <!-- ── ALL EVENTS ── -->
  <div class="all-events-section" id="all-events">
    <div class="section-header" style="margin-bottom:20px">
      <div class="section-title">All Events</div>
    </div>

    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍  Search events…" />
      <button class="filter-btn active" data-cat="">All</button>
      <button class="filter-btn" data-cat="Music">🎵 Music</button>
      <button class="filter-btn" data-cat="Sports">🏆 Sports</button>
      <button class="filter-btn" data-cat="Comedy">😂 Comedy</button>
      <button class="filter-btn" data-cat="Theatre">🎭 Theatre</button>
      <button class="filter-btn" data-cat="Conference">📋 Conference</button>
      <button class="filter-btn" data-cat="Festival">🎪 Festival</button>
      <button class="filter-btn" data-cat="Workshop">🔧 Workshop</button>
    </div>

    <div class="events-grid" id="eventsGrid">
      <div class="loading" style="grid-column:1/-1">Loading events…</div>
    </div>
  </div>

</div>

<script>
  const token = sessionStorage.getItem("token");
  if (!token) { location.href = "/"; }
  const headers = { "Content-Type": "application/json", Authorization: `Bearer ${token}` };

  let allEvents = [];
  let activeCategory = "";

  const CATEGORY_ICONS = {
    Music: "🎵", Sports: "🏆", Comedy: "😂", Theatre: "🎭",
    Conference: "📋", Festival: "🎪", Workshop: "🔧", Other: "🎟️",
  };

  function fmtDate(d) {
    return new Date(d).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
  }

  // ── Featured events ───────────────────────────────────────
  async function loadFeatured() {
    try {
      const r = await fetch("/events/featured");
      const data = await r.json();
      if (!data.length) {
        document.getElementById("featuredSection").style.display = "none";
        return;
      }
      document.getElementById("featuredCarousel").innerHTML = data.map(ev => {
        const icon = CATEGORY_ICONS[ev.category] || "🎟️";
        return `
          <div class="featured-card" onclick="goToBooking(${ev.id})">
            <div class="featured-badge-overlay">★ Featured</div>
            <div class="featured-img">${icon}</div>
            <div class="featured-body">
              <div class="featured-cat">${ev.category || "Other"}</div>
              <div class="featured-title">${ev.title}</div>
              <div class="featured-meta">
                <span>${fmtDate(ev.event_date)}</span>
                <span class="featured-price">${ev.price > 0 ? "₹" + ev.price : "Free"}</span>
              </div>
            </div>
          </div>`;
      }).join("");
    } catch {
      document.getElementById("featuredSection").style.display = "none";
    }
  }

  // ── Trending events ───────────────────────────────────────
  async function loadTrending() {
    try {
      const r = await fetch("/events/trending");
      const data = await r.json();
      if (!data.length) {
        document.getElementById("trendingSection").style.display = "none";
        return;
      }
      document.getElementById("trendingGrid").innerHTML = data.map((ev, i) => `
        <div class="trending-card" onclick="goToBooking(${ev.id})">
          <div class="trending-rank ${i < 3 ? "top3" : ""}">${i + 1}</div>
          <div class="trending-info">
            <div class="t-title">${ev.title}</div>
            <div class="t-meta">${fmtDate(ev.event_date)} · ${ev.category}</div>
          </div>
          <div class="trending-price">${ev.price > 0 ? "₹" + ev.price : "Free"}</div>
        </div>`).join("");
    } catch {
      document.getElementById("trendingSection").style.display = "none";
    }
  }

  // ── All events ────────────────────────────────────────────
  async function loadEvents() {
    try {
      const r = await fetch("/events", { headers });
      allEvents = await r.json();
      renderEvents();
    } catch {
      document.getElementById("eventsGrid").innerHTML = '<div class="empty" style="grid-column:1/-1">Failed to load events.</div>';
    }
  }

  function renderEvents() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    let filtered = allEvents.filter(ev => {
      const matchCat  = !activeCategory || ev.category === activeCategory;
      const matchSearch = !search
        || ev.title.toLowerCase().includes(search)
        || (ev.location || "").toLowerCase().includes(search)
        || (ev.description || "").toLowerCase().includes(search);
      return matchCat && matchSearch;
    });

    if (!filtered.length) {
      document.getElementById("eventsGrid").innerHTML = '<div class="empty" style="grid-column:1/-1">No events found.</div>';
      return;
    }

    document.getElementById("eventsGrid").innerHTML = filtered.map(ev => {
      const icon = CATEGORY_ICONS[ev.category] || "🎟️";
      const sold = ev.total_tickets - ev.available_tickets;
      const pct  = Math.round((sold / ev.total_tickets) * 100);
      return `
        <div class="event-card">
          <div class="ev-img">${icon}</div>
          <div class="ev-body">
            <div class="ev-cat">
              ${ev.is_featured ? '<span class="featured-star">★</span>' : ""}
              ${ev.category || "Other"}
            </div>
            <div class="ev-title">${ev.title}</div>
            <div class="ev-meta">
              <span>📅 ${fmtDate(ev.event_date)}</span>
              <span>📍 ${ev.location || "TBA"}</span>
            </div>
            <div class="ev-footer">
              <div>
                <div class="ev-price">${ev.price > 0 ? "₹" + ev.price : "Free"}</div>
                <div class="ev-tickets">${ev.available_tickets} left · ${pct}% sold</div>
              </div>
              <div class="book-action">
                ${ev.available_tickets === 0 ? "" : `
                  <input type="number" class="qty-input"
                    id="qty-${ev.id}"
                    min="1" max="${ev.available_tickets}"
                    value="1" title="Number of tickets" />`}
                <button class="btn-book"
                  ${ev.available_tickets === 0 ? "disabled" : ""}
                  onclick="goToBooking(${ev.id})">
                  ${ev.available_tickets === 0 ? "Sold Out" : "Book Now"}
                </button>
              </div>
            </div>
          </div>
        </div>`;
    }).join("");
  }

  // ── Category filter ───────────────────────────────────────
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeCategory = btn.dataset.cat;
      renderEvents();
    });
  });

  // ── Search ────────────────────────────────────────────────
  document.getElementById("searchInput").addEventListener("input", renderEvents);

  // ── Navigation ────────────────────────────────────────────
  function goToBooking(eventId) {
    const input = document.getElementById("qty-" + eventId);
    const tickets_booked = input ? parseInt(input.value, 10) : 1;

    if (!tickets_booked || tickets_booked <= 0) {
      alert("Please enter a valid number of tickets.");
      return;
    }

    // seat-selection.js reads "seat_selection_meta" — store both event id
    // and ticket count so the seat grid knows how many seats to enforce.
    sessionStorage.setItem("seat_selection_meta", JSON.stringify({
      event_id:       eventId,
      tickets_booked: tickets_booked,
    }));

    location.href = "/seat-selection";
  }

  // ── Logout ────────────────────────────────────────────────
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await fetch("/auth/logout", { method: "POST", headers });
    sessionStorage.clear();
    location.href = "/";
  });

  // ── Init ──────────────────────────────────────────────────
  loadFeatured();
  loadTrending();
  loadEvents();
</script>
</body>
</html>
