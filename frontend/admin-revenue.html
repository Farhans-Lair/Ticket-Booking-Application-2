<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Revenue & Payouts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#f0f2f7; --bg-side:#1a1d2e; --surface:#ffffff; --border:#e4e7f0;
      --text:#1a1d2e; --text-mid:#4a5068; --text-muted:#8b90a7;
      --gold:#f5a623; --green:#1aab6d; --green-light:#edfaf4;
      --blue:#3b5bdb; --red:#e53e3e; --red-light:#fff5f5;
      --purple:#7c6af7; --purple-light:#f3f0ff; --orange:#f59e0b;
      --shadow-sm:0 1px 4px rgba(0,0,0,0.06); --shadow-md:0 4px 16px rgba(0,0,0,0.08);
    }
    html,body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100%; }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:linear-gradient(rgba(59,91,219,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,91,219,0.04) 1px,transparent 1px);
      background-size:40px 40px; }

    .topbar { position:sticky; top:0; z-index:100; background:var(--bg-side); padding:0 36px; height:62px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(0,0,0,0.18); }
    .topbar-left { display:flex; align-items:center; gap:16px; }
    .logo { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:900; color:#f5c842; }
    .page-title-bar { font-size:.82rem; font-weight:600; color:rgba(255,255,255,0.45); letter-spacing:.05em; padding-left:16px; border-left:1px solid rgba(255,255,255,0.12); }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .btn-topbar { padding:8px 18px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500; cursor:pointer; transition:all .2s; }
    .btn-back { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.75); }
    .btn-back:hover { background:rgba(255,255,255,0.13); color:#fff; }
    .btn-logout { background:rgba(229,62,62,0.15); border:1px solid rgba(229,62,62,0.3); color:#fc8181; }
    .btn-logout:hover { background:rgba(229,62,62,0.28); }

    .main { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:36px 32px 80px; }

    /* PAGE TABS */
    .page-tabs { display:flex; gap:4px; margin-bottom:32px; background:#e8eaf2; border-radius:12px; padding:4px; width:fit-content; }
    .page-tab { padding:10px 24px; border:none; background:none; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:500; color:var(--text-muted); border-radius:9px; cursor:pointer; transition:all .2s; }
    .page-tab.active { background:#fff; color:var(--text); font-weight:600; box-shadow:var(--shadow-sm); }

    /* TAB PANELS */
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* REVENUE KPI STRIP */
    .kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:28px; }
    .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 20px; box-shadow:var(--shadow-sm); }
    .kpi-label { font-size:.72rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
    .kpi-value { font-size:1.7rem; font-weight:800; }
    .kpi-value.green  { color:var(--green); }
    .kpi-value.blue   { color:var(--blue); }
    .kpi-value.purple { color:var(--purple); }
    .kpi-value.orange { color:var(--orange); }

    /* PAYOUT REQUESTS TABLE */
    .section-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-sm); overflow:hidden; margin-bottom:24px; }
    .section-card-header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
    .section-card-header h2 { font-size:1.05rem; font-weight:700; }
    .filter-row { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-chip { padding:6px 14px; border:1px solid var(--border); background:none; border-radius:8px; font-size:.82rem; cursor:pointer; color:var(--text-mid); transition:all .2s; }
    .filter-chip.active { background:var(--blue); border-color:var(--blue); color:#fff; }

    table { width:100%; border-collapse:collapse; font-size:.87rem; }
    th { text-align:left; padding:12px 16px; color:var(--text-muted); font-weight:600; font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); white-space:nowrap; }
    td { padding:14px 16px; border-bottom:1px solid rgba(0,0,0,0.04); }
    tr:last-child td { border-bottom:none; }

    .status-pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:700; white-space:nowrap; }
    .sp-pending    { background:rgba(245,158,11,0.12); color:#d97706; }
    .sp-processing { background:rgba(124,106,247,0.12); color:var(--purple); }
    .sp-paid       { background:rgba(26,171,109,0.12); color:var(--green); }
    .sp-failed     { background:rgba(229,62,62,0.1);  color:var(--red); }

    .amount-col { font-weight:700; color:var(--green); }
    .btn-sm { padding:5px 12px; border:none; border-radius:6px; font-size:.78rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
    .btn-sm:hover { opacity:.82; }
    .btn-approve-pay { background:rgba(26,171,109,0.15); color:var(--green); }
    .btn-process-pay { background:rgba(124,106,247,0.12); color:var(--purple); }
    .btn-fail-pay    { background:rgba(229,62,62,0.1);   color:var(--red); }
    .btn-actions-row { display:flex; gap:6px; }

    .loading { text-align:center; padding:40px; color:var(--text-muted); }
    .empty   { text-align:center; padding:40px; color:var(--text-muted); }

    /* MODAL */
    .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; align-items:center; justify-content:center; }
    .modal-backdrop.open { display:flex; }
    .modal { background:#fff; border-radius:16px; padding:28px; width:100%; max-width:440px; }
    .modal h3 { font-size:1.05rem; margin-bottom:16px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:.78rem; font-weight:600; color:var(--text-muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.06em; }
    .form-group input, .form-group select { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:.88rem; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
    .btn-cancel-m { background:none; border:1px solid var(--border); color:var(--text-mid); padding:9px 20px; border-radius:8px; cursor:pointer; }
    .btn-primary-m { background:var(--blue); color:#fff; border:none; padding:9px 22px; border-radius:8px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">TicketVerse</span>
    <span class="page-title-bar">Revenue & Payouts</span>
  </div>
  <div class="topbar-right">
    <button class="btn-topbar btn-back" onclick="location.href='/admin'">← Dashboard</button>
    <button class="btn-topbar btn-logout" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="main">

  <!-- PAGE TABS -->
  <div class="page-tabs">
    <button class="page-tab active" data-tab="revenue">📊 Revenue</button>
    <button class="page-tab" data-tab="payouts">💳 Payout Requests</button>
  </div>

  <!-- ── REVENUE TAB ── -->
  <div class="tab-panel active" id="tab-revenue">
    <div class="kpi-strip">
      <div class="kpi-card"><div class="kpi-label">Total Revenue</div><div class="kpi-value green" id="kpiRevenue">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Bookings</div><div class="kpi-value blue"  id="kpiBookings">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Platform Fees</div><div class="kpi-value purple" id="kpiFees">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Tickets Sold</div><div class="kpi-value orange" id="kpiTickets">—</div></div>
    </div>
    <div id="adminRevenueContent"><div class="loading">Loading revenue data…</div></div>
  </div>

  <!-- ── PAYOUTS TAB ── (FIX Issue 5) -->
  <div class="tab-panel" id="tab-payouts">
    <div class="section-card">
      <div class="section-card-header">
        <h2>Organizer Payout Requests</h2>
        <div class="filter-row">
          <button class="filter-chip active" data-status="">All</button>
          <button class="filter-chip" data-status="pending">Pending</button>
          <button class="filter-chip" data-status="processing">Processing</button>
          <button class="filter-chip" data-status="paid">Paid</button>
          <button class="filter-chip" data-status="failed">Failed</button>
        </div>
      </div>
      <div id="payoutsContent">
        <div class="loading">Loading payout requests…</div>
      </div>
    </div>
  </div>

</div>

<!-- Status update modal -->
<div class="modal-backdrop" id="statusModal">
  <div class="modal">
    <h3>Update Payout Status</h3>
    <input type="hidden" id="statusPayoutId" />
    <div class="form-group">
      <label>New Status</label>
      <select id="newStatus">
        <option value="processing">Processing — transfer initiated</option>
        <option value="paid">Paid — organizer received funds</option>
        <option value="failed">Failed — needs retry</option>
      </select>
    </div>
    <div class="form-group">
      <label>Reference / UTR Number (optional)</label>
      <input type="text" id="statusRef" placeholder="Transaction reference" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-m" id="closeStatusModal">Cancel</button>
      <button class="btn-primary-m" id="submitStatus">Update</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin-auth.js"></script>
<script src="/js/admin-revenue.js"></script>
<script>
const token   = sessionStorage.getItem("token");
const headers = { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };

// ── Page tabs ──────────────────────────────────────────────────────────────
document.querySelectorAll(".page-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".page-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add("active");
    if (tab.dataset.tab === "payouts") loadPayouts();
  });
});

// ── Revenue tab (uses existing admin-revenue.js) ──────────────────────────
// admin-revenue.js populates #adminRevenueContent and kpi-* elements via its own init

// ── Payouts tab ────────────────────────────────────────────────────────────
let payoutsData   = [];
let payoutFilter  = "";

async function loadPayouts(status = payoutFilter) {
  payoutFilter = status;
  document.getElementById("payoutsContent").innerHTML = '<div class="loading">Loading…</div>';
  try {
    let url = "/admin/payouts/data?limit=100";
    if (status) url += `&status=${status}`;
    const r    = await fetch(url, { headers });
    const data = await r.json();
    payoutsData = data.payouts || [];
    renderPayouts(payoutsData);
  } catch {
    document.getElementById("payoutsContent").innerHTML = '<div class="empty">Failed to load payout data.</div>';
  }
}

function renderPayouts(list) {
  if (!list.length) {
    document.getElementById("payoutsContent").innerHTML = '<div class="empty">No payout records found.</div>';
    return;
  }
  const rows = list.map(p => {
    const orgName  = p.Organizer?.OrganizerProfile?.business_name || p.Organizer?.name || `#${p.organizer_id}`;
    const evTitle  = p.Event?.title ? p.Event.title.substring(0,28) + (p.Event.title.length > 28 ? "…" : "") : "All Events";
    const date     = new Date(p.created_at).toLocaleDateString("en-IN");
    const isRequest = !!p.requested_by;
    const canUpdate = ["pending","processing"].includes(p.status);
    return `
      <tr>
        <td>#${p.id}</td>
        <td>${escHtml(orgName)}</td>
        <td title="${p.Event?.title||""}">${escHtml(evTitle)}</td>
        <td>₹${parseFloat(p.amount).toFixed(2)}</td>
        <td style="color:#d97706">₹${parseFloat(p.platform_fee).toFixed(2)}</td>
        <td class="amount-col">₹${parseFloat(p.net_amount).toFixed(2)}</td>
        <td>${(p.payment_method||"—").replace("_"," ")}</td>
        <td>${isRequest ? '<span style="font-size:.72rem;background:rgba(124,106,247,0.1);color:#7c6af7;padding:2px 7px;border-radius:6px;font-weight:600;">Request</span>' : '<span style="font-size:.72rem;color:#8b90a7;">Admin</span>'}</td>
        <td><span class="status-pill sp-${p.status}">${p.status}</span></td>
        <td>${date}</td>
        <td>
          ${canUpdate ? `<div class="btn-actions-row">
            <button class="btn-sm btn-approve-pay" onclick="openStatusModal(${p.id},'paid')">Approve</button>
            <button class="btn-sm btn-process-pay" onclick="openStatusModal(${p.id},'processing')">Process</button>
            <button class="btn-sm btn-fail-pay" onclick="openStatusModal(${p.id},'failed')">Fail</button>
          </div>` : "—"}
        </td>
      </tr>`;
  }).join("");

  document.getElementById("payoutsContent").innerHTML = `
    <div style="overflow:auto">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Organizer</th><th>Event</th>
            <th>Gross</th><th>Fee</th><th>Net</th>
            <th>Method</th><th>Type</th><th>Status</th>
            <th>Date</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// Filter chips
document.querySelectorAll(".filter-chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    loadPayouts(chip.dataset.status);
  });
});

// Status modal
function openStatusModal(id, preselect) {
  document.getElementById("statusPayoutId").value = id;
  document.getElementById("statusRef").value      = "";
  if (preselect) document.getElementById("newStatus").value = preselect;
  document.getElementById("statusModal").classList.add("open");
}
document.getElementById("closeStatusModal").addEventListener("click", () =>
  document.getElementById("statusModal").classList.remove("open")
);
document.getElementById("submitStatus").addEventListener("click", async () => {
  const id     = document.getElementById("statusPayoutId").value;
  const status = document.getElementById("newStatus").value;
  const ref    = document.getElementById("statusRef").value.trim() || null;
  try {
    const r = await fetch(`/admin/payouts/${id}/status`, {
      method:"PUT", headers, body:JSON.stringify({status, reference_id: ref})
    });
    if (!r.ok) throw new Error();
    document.getElementById("statusModal").classList.remove("open");
    loadPayouts();
  } catch { alert("Failed to update payout status."); }
});

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.getElementById("logoutBtn").addEventListener("click", () => {
  fetch("/auth/logout",{method:"POST",credentials:"include"}).finally(()=>{ sessionStorage.clear(); location.replace("/"); });
});
</script>
</body>
</html>
