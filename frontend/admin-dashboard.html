<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:#f5c842; --gold-dark:#d4a520; --bg:#0a0a14;
      --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.09);
      --text:#f0eee8; --muted:rgba(240,238,232,0.5);
      --accent:#7c6af7; --red:#f74a6a; --green:#42e695;
    }
    html,body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100%; }
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .app { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:36px 28px 80px; }

    /* TOPBAR */
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:44px; padding-bottom:20px; border-bottom:1px solid var(--border); }
    .logo-wrap { display:flex; align-items:center; gap:10px; }
    .logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); }
    .admin-badge { padding:3px 10px; border-radius:20px; background:rgba(124,106,247,0.15); border:1px solid rgba(124,106,247,0.3); color:var(--accent); font-size:0.72rem; font-weight:700; letter-spacing:0.08em; }
    .nav-actions { display:flex; gap:10px; }
    .btn-ghost { padding:9px 20px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(8px); }
    .btn-ghost:hover { background:rgba(255,255,255,0.09); color:var(--text); }

    /* SECTION HEADERS */
    .section-header { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
    .section-header h2 { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; }
    .pill { padding:3px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }
    .pill-gold { background:rgba(245,200,66,0.12); color:var(--gold); border:1px solid rgba(245,200,66,0.25); }
    .pill-accent { background:rgba(124,106,247,0.12); color:var(--accent); border:1px solid rgba(124,106,247,0.25); }

    /* CARD */
    .card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:28px; backdrop-filter:blur(16px); box-shadow:0 8px 32px rgba(0,0,0,0.3); margin-bottom:32px; }

    /* FORM GRID */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .full { grid-column:1/-1; }
    .field-group { display:flex; flex-direction:column; gap:7px; }
    .field-group label { font-size:0.72rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:var(--muted); }
    .field-group input, .field-group select {
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
      border-radius:10px; padding:11px 14px; color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    .field-group input:focus, .field-group select:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(245,200,66,0.1); }
    .field-group input::placeholder { color:rgba(240,238,232,0.25); }
    .field-group select option { background:#1a1a30; color:var(--text); }
    .btn-primary { padding:13px 28px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border:none; border-radius:11px; color:#0a0a14; font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:700; cursor:pointer; transition:transform 0.15s,box-shadow 0.2s; box-shadow:0 4px 18px rgba(245,200,66,0.25); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(245,200,66,0.38); }

    /* ── IMAGE UPLOAD AREA (Create form) ── */
    .img-upload-area {
      border:2px dashed rgba(255,255,255,0.15); border-radius:12px;
      padding:22px; text-align:center; cursor:pointer;
      transition:border-color 0.2s, background 0.2s; position:relative;
    }
    .img-upload-area:hover { border-color:var(--gold); background:rgba(245,200,66,0.04); }
    .img-upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-icon { font-size:1.8rem; margin-bottom:6px; }
    .img-upload-area p { font-size:0.82rem; color:var(--muted); }
    .upload-hint { font-size:0.72rem; color:rgba(240,238,232,0.3); margin-top:4px; }

    /* Thumbnail previews */
    .img-preview-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    .img-thumb {
      position:relative; width:82px; height:82px;
      border-radius:10px; overflow:hidden; border:2px solid var(--border);
      flex-shrink:0;
    }
    .img-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .img-thumb .main-tag {
      position:absolute; bottom:0; left:0; right:0;
      background:rgba(245,200,66,0.88); color:#0a0a14;
      font-size:0.58rem; font-weight:800; text-align:center;
      padding:2px 0; text-transform:uppercase; letter-spacing:0.05em;
    }
    .img-thumb .remove-img {
      position:absolute; top:3px; right:3px;
      width:18px; height:18px; border-radius:50%;
      background:rgba(247,74,106,0.88); border:none;
      color:#fff; font-size:0.65rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; line-height:1;
    }

    /* EVENT CARDS */
    #events-list { display:flex; flex-direction:column; gap:16px; }
    .event-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:14px; padding:20px 22px; animation:card-in 0.4s cubic-bezier(0.16,1,0.3,1) both; transition:border-color 0.2s; }
    .event-card:hover { border-color:rgba(255,255,255,0.16); }
    @keyframes card-in { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }
    .event-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .category-badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; background:rgba(124,106,247,0.12); color:var(--accent); border:1px solid rgba(124,106,247,0.2); }
    .card-actions { display:flex; gap:8px; }
    .btn-save { padding:7px 18px; border-radius:8px; background:rgba(66,230,149,0.12); border:1px solid rgba(66,230,149,0.25); color:var(--green); font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .btn-save:hover { background:rgba(66,230,149,0.22); }
    .btn-delete { padding:7px 18px; border-radius:8px; background:rgba(247,74,106,0.1); border:1px solid rgba(247,74,106,0.22); color:var(--red); font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .btn-delete:hover { background:rgba(247,74,106,0.2); }
    .event-edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .event-edit-grid .field-group input, .event-edit-grid .field-group select { padding:9px 12px; font-size:0.85rem; }
    .stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .stat-chip { padding:6px 14px; border-radius:8px; background:rgba(255,255,255,0.04); border:1px solid var(--border); font-size:0.8rem; color:var(--muted); }
    .stat-chip strong { font-weight:700; }
    .stat-chip.green strong { color:var(--green); }

    /* ── IMAGE MANAGEMENT inside event edit cards ── */
    .img-section-label {
      font-size:0.72rem; font-weight:600; text-transform:uppercase;
      letter-spacing:0.08em; color:var(--muted); margin-bottom:8px;
    }
    .img-section-label span { font-weight:400; text-transform:none; letter-spacing:0; font-size:0.72rem; color:rgba(240,238,232,0.25); }
    .existing-imgs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
    .existing-img-thumb {
      position:relative; width:68px; height:68px;
      border-radius:8px; overflow:hidden; border:2px solid var(--border); flex-shrink:0;
    }
    .existing-img-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .existing-img-thumb .main-badge {
      position:absolute; bottom:0; left:0; right:0;
      background:rgba(245,200,66,0.88); color:#0a0a14;
      font-size:0.55rem; font-weight:800; text-align:center;
      padding:2px 0; text-transform:uppercase;
    }
    .existing-img-thumb .remove-btn {
      position:absolute; top:2px; right:2px;
      width:17px; height:17px; border-radius:50%;
      background:rgba(247,74,106,0.88); border:none;
      color:#fff; font-size:0.6rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-weight:700;
    }
    .card-img-upload-area {
      border:1.5px dashed rgba(255,255,255,0.12); border-radius:10px;
      padding:11px 14px; text-align:center; cursor:pointer;
      transition:all 0.2s; position:relative;
      font-size:0.8rem; color:var(--muted);
    }
    .card-img-upload-area:hover { border-color:var(--gold); background:rgba(245,200,66,0.04); }
    .card-img-upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }

    .divider { border:none; border-top:1px solid var(--border); margin:28px 0; }
    @media(max-width:640px){.form-grid,.event-edit-grid{grid-template-columns:1fr;}.full{grid-column:1;}}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="app">
  <div class="topbar">
    <div class="logo-wrap">
      <span class="logo">TicketVerse</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="nav-actions">
      <button class="btn-ghost" onclick="openRevenue()">📊 Revenue</button>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="section-header">
    <h2>Create New Event</h2>
    <span class="pill pill-gold">+ NEW</span>
  </div>

  <div class="card">
    <div class="form-grid">
      <div class="field-group full"><label>Event Title</label><input type="text" id="title" placeholder="e.g. Coldplay World Tour 2025"/></div>
      <div class="field-group full"><label>Description</label><input type="text" id="description" placeholder="Short description"/></div>
      <div class="field-group"><label>Location</label><input type="text" id="location" placeholder="City / Venue"/></div>
      <div class="field-group"><label>Event Date</label><input type="date" id="event_date"/></div>
      <div class="field-group"><label>Price per Ticket (₹)</label><input type="number" id="price" placeholder="e.g. 499"/></div>
      <div class="field-group"><label>Total Tickets</label><input type="number" id="total_tickets" placeholder="e.g. 500"/></div>
      <div class="field-group full">
        <label>Category</label>
        <select id="category">
          <option value="Music">🎵 Music</option>
          <option value="Sports">🏆 Sports</option>
          <option value="Comedy">😂 Comedy</option>
          <option value="Theatre">🎭 Theatre</option>
          <option value="Conference">🎙️ Conference</option>
          <option value="Festival">🎪 Festival</option>
          <option value="Workshop">🔧 Workshop</option>
          <option value="Other" selected>✨ Other</option>
        </select>
      </div>

      <!-- IMAGE UPLOAD -->
      <div class="field-group full">
        <label>Event Images <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.75rem;color:rgba(240,238,232,0.3)">(up to 5 · first image = main cover)</span></label>
        <div class="img-upload-area">
          <input type="file" id="create-img-input" accept="image/*" multiple onchange="handleCreateImages(this)"/>
          <div class="upload-icon">🖼️</div>
          <p>Click or drag images here</p>
          <p class="upload-hint">JPG, PNG, WEBP — max 5 images</p>
        </div>
        <div class="img-preview-row" id="create-img-preview"></div>
      </div>

      <div class="full"><button class="btn-primary" id="createEventBtn">Create Event →</button></div>
    </div>
  </div>

  <hr class="divider"/>

  <div class="section-header">
    <h2>All Events</h2>
    <span class="pill pill-accent">MANAGE</span>
  </div>
  <div id="events-list"></div>
</div>

<!-- Canvas BG -->
<script>
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const stars=Array.from({length:200},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.1+.2,a:Math.random(),da:(Math.random()*.007+.002)*(Math.random()>.5?1:-1)}));
const pts=Array.from({length:80},()=>({x:Math.random()*W||500,y:Math.random()*H||400,r:Math.random()*1.8+.4,speed:Math.random()*.4+.15,dx:(Math.random()-.5)*.3,alpha:Math.random()*.4+.1,fadeDir:1,col:['rgba(245,200,66,','rgba(124,106,247,','rgba(247,74,106,'][Math.floor(Math.random()*3)]}));
function draw(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0a0a14');g.addColorStop(1,'#0d0d22');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  [[.1,.3,280,'rgba(124,106,247,0.06)'],[.85,.7,350,'rgba(245,200,66,0.04)'],[.5,.1,200,'rgba(247,74,106,0.04)']].forEach(([ox,oy,r,c])=>{const rg=ctx.createRadialGradient(ox*W,oy*H,0,ox*W,oy*H,r);rg.addColorStop(0,c);rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);});
  stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.45})`;ctx.fill();});
  ctx.strokeStyle='rgba(255,255,255,0.016)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  pts.forEach(p=>{p.y-=p.speed;p.x+=p.dx;p.alpha+=.003*p.fadeDir;if(p.alpha>.6||p.alpha<.07)p.fadeDir*=-1;if(p.y<-10){p.x=Math.random()*W;p.y=H+10;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col+p.alpha+')';ctx.fill();});
  requestAnimationFrame(draw);
}
draw();

/* ─────────────────────────────────────────────
   IMAGE HELPERS
───────────────────────────────────────────── */

// Holds base64 images for the create-new-event form
let createImages = [];

// Per-event image buffer for edit cards  { eventId: [base64, ...] }
const editImages = {};

/* Resize image to max 800px width and convert to base64 jpeg */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxW = 800;
        const scale = img.width > maxW ? maxW / img.width : 1;
        const cv = document.createElement('canvas');
        cv.width  = Math.round(img.width  * scale);
        cv.height = Math.round(img.height * scale);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        resolve(cv.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ── CREATE FORM image handlers ── */
async function handleCreateImages(input) {
  const files = Array.from(input.files).slice(0, 5);
  createImages = [];
  const preview = document.getElementById('create-img-preview');
  preview.innerHTML = '<span style="font-size:.8rem;color:var(--muted)">Processing…</span>';
  for (const f of files) createImages.push(await fileToBase64(f));
  renderCreatePreview();
  input.value = '';
}

function renderCreatePreview() {
  const preview = document.getElementById('create-img-preview');
  preview.innerHTML = '';
  createImages.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-thumb';
    wrap.innerHTML = `
      <img src="${src}" alt="preview"/>
      ${i === 0 ? '<div class="main-tag">Main</div>' : ''}
      <button class="remove-img" onclick="removeCreateImg(${i})">✕</button>`;
    preview.appendChild(wrap);
  });
}

function removeCreateImg(idx) {
  createImages.splice(idx, 1);
  renderCreatePreview();
}

/* ── EDIT CARD image handlers ── */
async function handleEditImages(input, eventId) {
  const remaining = 5 - (editImages[eventId]?.length || 0);
  const files = Array.from(input.files).slice(0, remaining);
  if (!editImages[eventId]) editImages[eventId] = [];
  for (const f of files) {
    if (editImages[eventId].length >= 5) break;
    editImages[eventId].push(await fileToBase64(f));
  }
  renderEditPreview(eventId);
  input.value = '';
}

function removeEditImg(eventId, idx) {
  editImages[eventId].splice(idx, 1);
  renderEditPreview(eventId);
}

function renderEditPreview(eventId) {
  const container = document.getElementById(`edit-img-preview-${eventId}`);
  if (!container) return;
  container.innerHTML = '';
  (editImages[eventId] || []).forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'existing-img-thumb';
    wrap.innerHTML = `
      <img src="${src}" alt="event image"/>
      ${i === 0 ? '<div class="main-badge">Main</div>' : ''}
      <button class="remove-btn" onclick="removeEditImg(${eventId},${i})">✕</button>`;
    container.appendChild(wrap);
  });
}
</script>

<script src="/js/api.js"></script>
<script src="/js/admin-auth.js"></script>
<script src="/js/admin-dashboard.js"></script>

<!-- ═══════════════════════════════════════════════════════
     PATCHES: override createEvent, updateEvent, loadEvents
     to wire up images without touching admin-dashboard.js
════════════════════════════════════════════════════════ -->
<script>
(function () {

  /* ── Patch createEvent ── */
  window.createEvent = async function () {
    const title         = document.getElementById("title").value;
    const description   = document.getElementById("description").value;
    const location      = document.getElementById("location").value;
    const event_date    = document.getElementById("event_date").value;
    const price         = Number(document.getElementById("price").value);
    const total_tickets = Number(document.getElementById("total_tickets").value);
    const category      = document.getElementById("category").value;

    if (!title || !event_date || !price || !total_tickets) {
      alert("Title, Date, Price and Total Tickets are required");
      return;
    }

    try {
      await apiRequest("/events", "POST", {
        title, description, location, event_date, price, total_tickets, category,
        images: createImages.length > 0 ? createImages : undefined,
      }, true);

      alert("Event created successfully!");
      ["title","description","location","event_date","price","total_tickets"]
        .forEach(id => document.getElementById(id).value = "");
      document.getElementById("category").value = "Other";
      createImages = [];
      document.getElementById('create-img-preview').innerHTML = '';
      loadEvents();
    } catch (err) {
      alert("Error creating event: " + err.message);
    }
  };

  /* ── Patch updateEvent ── */
  window.updateEvent = async function (id) {
    try {
      const title         = document.getElementById(`title-${id}`).value;
      const price         = Number(document.getElementById(`price-${id}`).value);
      const event_date    = document.getElementById(`date-${id}`).value;
      const total_tickets = Number(document.getElementById(`total-${id}`).value);
      const category      = document.getElementById(`cat-${id}`).value;

      if (!title)              { alert("Title required"); return; }
      if (!price || price <= 0){ alert("Price must be > 0"); return; }
      if (total_tickets <= 0)  { alert("Total tickets must be > 0"); return; }

      await apiRequest(`/events/${id}`, "PUT", {
        title, price, event_date, total_tickets, category,
        images: editImages[id] || [],
      }, true);

      alert("Event Updated");
      loadEvents();
    } catch (err) {
      alert(err.message || "Update Failed");
    }
  };

  /* ── Patch loadEvents ── */
  window.loadEvents = async function () {
    const list = document.getElementById("events-list");
    list.innerHTML = "";
    try {
      const events = await apiRequest("/events", "GET", null, true);
      if (!events || events.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);padding:20px 0">No events available</p>';
        return;
      }

      events.forEach((event, i) => {
        const sold = event.total_tickets - event.available_tickets;
        const rev  = sold * event.price;
        const imgs = event.images || [];

        // Seed the edit buffer with existing images
        editImages[event.id] = [...imgs];

        const div = document.createElement("div");
        div.className = "event-card";
        div.style.animationDelay = `${i * 0.05}s`;

        div.innerHTML = `
          <div class="event-card-top">
            <span class="category-badge">${event.category || 'Other'}</span>
            <div class="card-actions">
              <button class="btn-save"   onclick="updateEvent(${event.id})">✓ Save</button>
              <button class="btn-delete" onclick="deleteEvent(${event.id})">✕ Delete</button>
            </div>
          </div>

          <div class="event-edit-grid">
            <div class="field-group"><label>Title</label><input id="title-${event.id}" value="${event.title}"/></div>
            <div class="field-group">
              <label>Category</label>
              <select id="cat-${event.id}">
                ${["Music","Sports","Comedy","Theatre","Conference","Festival","Workshop","Other"]
                  .map(c => `<option value="${c}"${c === event.category ? ' selected' : ''}>${c}</option>`)
                  .join('')}
              </select>
            </div>
            <div class="field-group"><label>Price (₹)</label><input type="number" id="price-${event.id}" value="${event.price}" oninput="ticketPreview(${event.id})"/></div>
            <div class="field-group"><label>Date</label><input type="date" id="date-${event.id}" value="${event.event_date ? event.event_date.split('T')[0] : ''}"/></div>
            <div class="field-group"><label>Total Tickets</label><input type="number" id="total-${event.id}" value="${event.total_tickets}" oninput="ticketPreview(${event.id})"/></div>
          </div>

          <div class="stats-row">
            <div class="stat-chip">Available: <strong id="available-${event.id}">${event.available_tickets}</strong></div>
            <div class="stat-chip">Sold: <strong id="sold-${event.id}">${sold}</strong></div>
            <div class="stat-chip green">Revenue: <strong id="revenue-${event.id}">₹${rev}</strong></div>
          </div>

          <!-- Image management section -->
          <div>
            <div class="img-section-label">
              Event Images <span>(first image = main cover · max 5)</span>
            </div>
            <div class="existing-imgs" id="edit-img-preview-${event.id}"></div>
            ${imgs.length < 5 ? `
            <div class="card-img-upload-area">
              <input type="file" accept="image/*" multiple onchange="handleEditImages(this,${event.id})"/>
              📎 Add images ${imgs.length > 0 ? '(' + imgs.length + '/5)' : ''}
            </div>` : ''}
          </div>`;

        list.appendChild(div);
        renderEditPreview(event.id);
      });

    } catch (err) {
      alert("Error loading events: " + err.message);
    }
  };

  // AFTER
   document.addEventListener("DOMContentLoaded", () => {
     const btn = document.getElementById("createEventBtn");
     if (btn) btn.onclick = window.createEvent;  // ← overrides the binding in admin-dashboard.js
     setTimeout(() => window.loadEvents(), 100);
   });
})();
</script>

</body>
</html>
