<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Event</title>
</head>
<body>

  <h2>Create Event</h2>

  <form id="create-event-form" onsubmit="createEvent(event)">
    <input
      id="name"
      placeholder="Event name"
      required
    />
    <br />

    <textarea
      id="description"
      placeholder="Description"
    ></textarea>
    <br />

    <input
      id="tickets"
      type="number"
      placeholder="Tickets"
      min="1"
      required
    />
    <br />

    <button type="submit">Create</button>
  </form>

  <br />
  <button onclick="logout()">Logout</button>

  <script src="create-events.js"></script>
</body>
</html>
