<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Moderation — TicketVerse Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #f5c842; --bg: #0a0a14; --card: #13131f;
      --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.1);
      --text: #f0eee8; --muted: rgba(240,238,232,0.5);
      --accent: #7c6af7; --green: #22c55e; --red: #f74a6a; --orange: #f59e0b;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; background: rgba(10,10,20,0.97); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 50; }
    .nav-logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.3rem; text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.88rem; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }

    /* LAYOUT */
    .page { max-width: 1100px; margin: 40px auto; padding: 0 24px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; }
    .page-header p  { color: var(--muted); margin-top: 4px; font-size: 0.9rem; }

    /* FILTER TABS */
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-tab { padding: 8px 20px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--muted); border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all .2s; }
    .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--glass-border); border-radius: 12px; padding: 18px 20px; }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; }
    .stat-card .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .stat-card.pending .num  { color: var(--orange); }
    .stat-card.approved .num { color: var(--green); }
    .stat-card.rejected .num { color: var(--red); }

    /* EVENT CARDS */
    .events-grid { display: flex; flex-direction: column; gap: 14px; }
    .event-card { background: var(--card); border: 1px solid var(--glass-border); border-radius: 14px; padding: 20px 24px; display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; }
    .event-card.status-pending  { border-left: 4px solid var(--orange); }
    .event-card.status-approved { border-left: 4px solid var(--green); }
    .event-card.status-rejected { border-left: 4px solid var(--red); }

    .ev-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
    .ev-meta  { font-size: 0.82rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
    .ev-meta span::before { content: "· "; }
    .ev-meta span:first-child::before { content: ""; }

    .status-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-pending  { background: rgba(245,158,11,0.15); color: var(--orange); }
    .badge-approved { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge-rejected { background: rgba(247,74,106,0.15); color: var(--red); }

    .organizer-info { margin-top: 10px; font-size: 0.82rem; color: var(--muted); }
    .organizer-info strong { color: var(--text); }

    .action-col { display: flex; flex-direction: column; gap: 8px; min-width: 130px; align-items: flex-end; }
    .btn { padding: 9px 20px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity .2s; width: 100%; }
    .btn:hover { opacity: 0.85; }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-reject  { background: var(--red);   color: #fff; }
    .btn-feature { background: rgba(245,200,66,0.15); color: var(--gold); border: 1px solid rgba(245,200,66,0.3); }
    .btn-feature.featured { background: var(--gold); color: #000; border-color: var(--gold); }

    /* MODAL */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--glass-border); border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; }
    .modal h3 { font-size: 1.1rem; margin-bottom: 16px; }
    .modal textarea { width: 100%; padding: 12px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.9rem; min-height: 100px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
    .btn-cancel { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); padding: 10px 22px; border-radius: 8px; cursor: pointer; font-size: 0.88rem; }

    .loading { text-align: center; padding: 48px; color: var(--muted); }
    .empty { text-align: center; padding: 48px; color: var(--muted); }

    @media (max-width: 640px) {
      nav { padding: 14px 18px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .event-card { grid-template-columns: 1fr; }
      .action-col { flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/admin">TicketVerse Admin</a>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/organizers">Organizers</a>
    <a href="/admin/moderation" class="active">Moderation</a>
    <a href="/admin/payouts">Payouts</a>
    <a href="/admin/revenue">Revenue</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Event Moderation</h1>
      <p>Review and approve or reject organizer-submitted events.</p>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card pending"><div class="num" id="cntPending">—</div><div class="lbl">Pending Review</div></div>
    <div class="stat-card approved"><div class="num" id="cntApproved">—</div><div class="lbl">Approved</div></div>
    <div class="stat-card rejected"><div class="num" id="cntRejected">—</div><div class="lbl">Rejected</div></div>
    <div class="stat-card"><div class="num" id="cntTotal">—</div><div class="lbl">Total Events</div></div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" data-status="all">All</button>
    <button class="filter-tab" data-status="pending">Pending</button>
    <button class="filter-tab" data-status="approved">Approved</button>
    <button class="filter-tab" data-status="rejected">Rejected</button>
  </div>

  <div class="events-grid" id="eventsList">
    <div class="loading">Loading events…</div>
  </div>
</div>

<!-- Reject modal -->
<div class="modal-backdrop" id="rejectModal">
  <div class="modal">
    <h3>Reject Event</h3>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:14px;">Provide a reason so the organizer can improve and resubmit.</p>
    <textarea id="rejectNote" placeholder="Reason for rejection…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelReject">Cancel</button>
      <button class="btn btn-reject" id="confirmReject">Reject Event</button>
    </div>
  </div>
</div>

<script>
  const token = sessionStorage.getItem("token");
  if (!token) { location.href = "/admin"; }
  const headers = { "Content-Type": "application/json", Authorization: `Bearer ${token}` };

  let allEvents = [];
  let activeFilter = "all";
  let pendingRejectId = null;

  // ── Load all events ───────────────────────────────────────
  async function loadEvents() {
    document.getElementById("eventsList").innerHTML = '<div class="loading">Loading events…</div>';
    try {
      const r    = await fetch("/admin/moderation/events", { headers });
      allEvents  = await r.json();
      updateStats();
      renderEvents();
    } catch (e) {
      document.getElementById("eventsList").innerHTML = '<div class="empty">Failed to load events.</div>';
    }
  }

  function updateStats() {
    const p = allEvents.filter(e => e.status === "pending").length;
    const a = allEvents.filter(e => e.status === "approved").length;
    const r = allEvents.filter(e => e.status === "rejected").length;
    document.getElementById("cntPending").textContent  = p;
    document.getElementById("cntApproved").textContent = a;
    document.getElementById("cntRejected").textContent = r;
    document.getElementById("cntTotal").textContent    = allEvents.length;
  }

  function renderEvents() {
    const filtered = activeFilter === "all"
      ? allEvents
      : allEvents.filter(e => e.status === activeFilter);

    if (!filtered.length) {
      document.getElementById("eventsList").innerHTML = '<div class="empty">No events in this category.</div>';
      return;
    }

    document.getElementById("eventsList").innerHTML = filtered.map(ev => {
      const date = new Date(ev.event_date).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
      const isFeatured = ev.is_featured;
      const isPending  = ev.status === "pending";
      return `
        <div class="event-card status-${ev.status}" id="ec-${ev.id}">
          <div>
            <div class="ev-title">${ev.title}</div>
            <div class="ev-meta">
              <span>${date}</span>
              <span>${ev.location || "TBA"}</span>
              <span>${ev.category || "Other"}</span>
              <span>₹${ev.price} · ${ev.total_tickets} tickets</span>
            </div>
            <span class="status-badge badge-${ev.status}">${ev.status.charAt(0).toUpperCase() + ev.status.slice(1)}</span>
            ${ev.moderation_note ? `<div style="font-size:.8rem;color:var(--muted);margin-top:8px;">Note: ${ev.moderation_note}</div>` : ""}
            <div class="organizer-info">
              ${ev.organizer_id
                ? `<strong>Organizer event</strong> (ID: ${ev.organizer_id})`
                : `<strong>Platform event</strong> (Admin created)`}
            </div>
          </div>
          <div class="action-col">
            ${isPending ? `<button class="btn btn-approve" onclick="approveEvent(${ev.id})">Approve</button>` : ""}
            ${isPending ? `<button class="btn btn-reject"  onclick="openReject(${ev.id})">Reject</button>` : ""}
            <button class="btn btn-feature ${isFeatured ? "featured" : ""}" onclick="toggleFeature(${ev.id}, ${!isFeatured}, this)">
              ${isFeatured ? "★ Featured" : "☆ Feature"}
            </button>
          </div>
        </div>`;
    }).join("");
  }

  // ── Filter tabs ───────────────────────────────────────────
  document.querySelectorAll(".filter-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.status;
      renderEvents();
    });
  });

  // ── Approve ───────────────────────────────────────────────
  async function approveEvent(id) {
    try {
      const r = await fetch(`/admin/moderation/events/${id}/approve`, { method: "PUT", headers });
      if (!r.ok) throw new Error();
      const idx = allEvents.findIndex(e => e.id === id);
      if (idx !== -1) allEvents[idx].status = "approved";
      updateStats(); renderEvents();
    } catch { alert("Failed to approve event."); }
  }

  // ── Reject ────────────────────────────────────────────────
  function openReject(id) {
    pendingRejectId = id;
    document.getElementById("rejectNote").value = "";
    document.getElementById("rejectModal").classList.add("open");
  }

  document.getElementById("cancelReject").addEventListener("click", () => {
    document.getElementById("rejectModal").classList.remove("open");
  });

  document.getElementById("confirmReject").addEventListener("click", async () => {
    const note = document.getElementById("rejectNote").value.trim();
    if (!note) { alert("Please provide a rejection reason."); return; }
    try {
      const r = await fetch(`/admin/moderation/events/${pendingRejectId}/reject`, {
        method: "PUT", headers, body: JSON.stringify({ note }),
      });
      if (!r.ok) throw new Error();
      const idx = allEvents.findIndex(e => e.id === pendingRejectId);
      if (idx !== -1) { allEvents[idx].status = "rejected"; allEvents[idx].moderation_note = note; }
      document.getElementById("rejectModal").classList.remove("open");
      updateStats(); renderEvents();
    } catch { alert("Failed to reject event."); }
  });

  // ── Toggle Feature ────────────────────────────────────────
  async function toggleFeature(id, makeFeature, btn) {
    try {
      const r = await fetch(`/admin/events/${id}/feature`, {
        method: "PUT", headers,
        body: JSON.stringify({ is_featured: makeFeature }),
      });
      if (!r.ok) throw new Error();
      const idx = allEvents.findIndex(e => e.id === id);
      if (idx !== -1) allEvents[idx].is_featured = makeFeature;
      btn.textContent = makeFeature ? "★ Featured" : "☆ Feature";
      btn.classList.toggle("featured", makeFeature);
    } catch { alert("Failed to update featured status."); }
  }

  loadEvents();
</script>
</body>
</html>
