<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Seats</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }

    .seat-page { max-width: 700px; margin: 0 auto; }

    h2 { color: #1e1e2e; margin-bottom: 4px; }

    .seat-info { font-size: 0.9rem; color: #555; margin-bottom: 20px; }

    /* Legend */
    .legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
    .legend-box {
      width: 24px; height: 24px; border-radius: 4px; border: 2px solid #ccc;
    }
    .legend-box.available { background: #e0e7ff; border-color: #4f46e5; }
    .legend-box.selected  { background: #4f46e5; border-color: #4f46e5; }
    .legend-box.booked    { background: #d1d5db; border-color: #9ca3af; }

    /* Seat Grid */
    .row-label { font-weight: bold; font-size: 0.8rem; color: #888; min-width: 20px; }

    .seat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }

    .seat {
      width: 36px; height: 36px; border-radius: 6px; border: 2px solid #4f46e5;
      background: #e0e7ff; color: #4f46e5; font-size: 0.7rem; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .seat:hover:not(.booked) { background: #c7d2fe; }
    .seat.selected { background: #4f46e5; color: white; }
    .seat.booked   { background: #d1d5db; border-color: #9ca3af; color: #6b7280; cursor: not-allowed; }

    /* Stage indicator */
    .stage {
      text-align: center; background: #1e1e2e; color: white;
      padding: 8px; border-radius: 8px; margin-bottom: 24px;
      font-size: 0.85rem; letter-spacing: 2px;
    }

    /* Counter & Button */
    .selection-bar {
      position: sticky; bottom: 0; background: white; padding: 16px;
      border-top: 2px solid #e0e7ff; margin-top: 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-radius: 0 0 12px 12px;
    }
    .selection-count { font-size: 1rem; color: #1e1e2e; }
    .selection-count span { font-weight: bold; color: #4f46e5; }

    #proceed-btn {
      padding: 12px 28px; background: #4f46e5; color: white;
      border: none; border-radius: 8px; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    #proceed-btn:hover:not(:disabled) { background: #4338ca; }
    #proceed-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .back-link {
      display: inline-block; margin-bottom: 16px;
      color: #4f46e5; text-decoration: none; font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="seat-page">
    <a class="back-link" href="/events-page">← Back to Events</a>
    <h2 id="event-title">Select Your Seats</h2>
    <p class="seat-info" id="seat-info"></p>

    <div class="stage">🎭 STAGE / SCREEN</div>

    <div class="legend">
      <div class="legend-item"><div class="legend-box available"></div> Available</div>
      <div class="legend-item"><div class="legend-box selected"></div> Selected</div>
      <div class="legend-item"><div class="legend-box booked"></div> Booked</div>
    </div>

    <div id="seat-grid"></div>

    <div class="selection-bar">
      <div class="selection-count">
        Selected: <span id="selected-count">0</span> / <span id="required-count">0</span>
      </div>
      <button id="proceed-btn" disabled>Proceed to Payment →</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/seat-selection.js"></script>
</body>
</html>
