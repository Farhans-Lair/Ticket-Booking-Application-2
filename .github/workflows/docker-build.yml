name: CI - Test, Build & Push Backend Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION:     ap-south-1
      AWS_ACCOUNT_ID: 453551850734
      ECR_REPOSITORY: ticket-backend

      # ── Database ────────────────────────────────────────────
      # FIX: DB_NAME updated from ticket_db → ticket_booking_db
      DB_HOST:     127.0.0.1
      DB_PORT:     3306
      DB_NAME:     ticket_booking_db
      DB_USER:     ticket_user
      DB_PASSWORD: ticket_password

      # ── App ─────────────────────────────────────────────────
      NODE_ENV:    test
      JWT_SECRET:  ci_test_jwt_secret_not_used_in_prod

      # ── Razorpay (stubs for CI — not actually called) ───────
      RAZORPAY_KEY_ID:     rzp_test_placeholder_for_ci
      RAZORPAY_KEY_SECRET: placeholder_secret_for_ci

      # ── Email (stubs for CI) ─────────────────────────────────
      EMAIL_USER: ci@example.com
      EMAIL_PASS: ci_placeholder

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          # FIX: MYSQL_DATABASE updated from ticket_db → ticket_booking_db
          MYSQL_DATABASE: ticket_booking_db
          MYSQL_USER:     ticket_user
          MYSQL_PASSWORD: ticket_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -prootpassword && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      # ── FIX: Initialise the database schema before running tests ──
      - name: Load database schema
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword ticket_booking_db \
            < db/master_schema.sql
          echo "✅ Schema loaded successfully"

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

      # ─────────────────────────────────────────────────────────
      # The steps below only run when tests pass
      # ─────────────────────────────────────────────────────────

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::453551850734:role/GitHubActions-ECR-Push-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --region $AWS_REGION \
          || aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest

          docker build \
            -f backend/Dockerfile \
            -t $IMAGE_URI \
            .

          docker push $IMAGE_URI

      - name: Deploy to EC2 via SSM
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest

          INSTANCE_ID=$(aws ec2 describe-instances \
            --region $AWS_REGION \
            --filters "Name=tag:Name,Values=ticket*" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Deploying to instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --region $AWS_REGION \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["
              aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com,
              docker pull $IMAGE_URI,
              docker rm -f ticket-backend || true,
              docker run -d --name ticket-backend --restart always --env-file /home/ec2-user/ticket-backend/.env -p 3000:3000 $IMAGE_URI
            "] \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --region $AWS_REGION

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --region $AWS_REGION \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text
