name: CI - Test, Build & Push Backend Image

on:
  push:
    branches:
      - main
      - bootstrap    # bootstrap branch runs tests only — no AWS steps

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Test
  # Runs on EVERY branch (main + bootstrap)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    env:
      DB_HOST:     127.0.0.1
      DB_PORT:     3306
      DB_NAME:     ticket_booking_db
      DB_USER:     ticket_user_1
      DB_PASSWORD: ticket_password
      NODE_ENV:    test
      JWT_SECRET:  ci_test_jwt_secret_not_used_in_prod
      RAZORPAY_KEY_ID:     rzp_test_placeholder_for_ci
      RAZORPAY_KEY_SECRET: placeholder_secret_for_ci
      EMAIL_USER:  ci@example.com
      EMAIL_PASS:  ci_placeholder
      S3_BUCKET_NAME: ci-placeholder-bucket

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: ticket_booking_db
          MYSQL_USER:     ticket_user_1
          MYSQL_PASSWORD: ticket_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -prootpassword && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Load database schema
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword ticket_booking_db \
            < db/master_schema.sql
          echo "Schema loaded successfully"

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy
  # Runs ONLY on main branch — requires test job to pass first
  # AWS steps never run on bootstrap branch
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'   # ← skipped entirely on bootstrap branch

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION:     ap-south-1
      AWS_ACCOUNT_ID: 349744179793
      ECR_REPOSITORY: ticket-backend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::349744179793:role/GitHubActions-ECR-Push-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # ECR is owned by Terraform (ecr.tf — created in Phase 1).
      # This step only verifies it exists — never creates it.
      - name: Verify ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --region $AWS_REGION
          echo "ECR repository confirmed."

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest

          docker build \
            -f backend/Dockerfile \
            -t $IMAGE_URI \
            .

          docker push $IMAGE_URI

      # Guard: skip SSM deploy gracefully if no EC2 instance exists yet.
      # This is expected during Phase 2 (first push to main after Phase 1 terraform).
      # Once full terraform apply creates EC2, all future pushes deploy normally.
      - name: Deploy to EC2 via SSM
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest

          INSTANCE_ID=$(aws ec2 describe-instances \
            --region $AWS_REGION \
            --filters "Name=tag:Name,Values=ticket*" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running EC2 instance found."
            echo "Image pushed to ECR successfully."
            echo "Run: terraform apply (full) to create infrastructure."
            echo "EC2 will pull this image automatically on first boot."
            exit 0
          fi

          echo "Deploying to instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --region $AWS_REGION \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["
              aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com,
              docker pull $IMAGE_URI,
              docker rm -f ticket-backend || true,
              docker run -d --name ticket-backend --restart always --env-file /home/ec2-user/ticket-backend/.env -p 3000:3000 -v /home/ec2-user/ticket-backend/logs:/app/logs $IMAGE_URI
            "] \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in {1..18}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --region $AWS_REGION \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Deploy status ($i/18): $STATUS"
            [ "$STATUS" = "Success" ] && break
            [ "$STATUS" = "Failed" ]  && echo "Deploy failed on EC2" && exit 1
            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --region $AWS_REGION \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text
