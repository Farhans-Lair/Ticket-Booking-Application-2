name: CI - Test & Build Backend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # ✅ MySQL service for DB-aware tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: ticket_db
          MYSQL_USER: ticket_user
          MYSQL_PASSWORD: ticket_password
        ports:
          - 3306:3306
        options: >-
          --default-authentication-plugin=mysql_native_password
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # ✅ CRITICAL: environment variables used by Sequelize + Jest
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: ticket_db
      DB_USER: ticket_user
      DB_PASSWORD: ticket_password
      JWT_SECRET: test_jwt_secret
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend tests (with MySQL)
        run: |
          cd backend
          npm test

      - name: Build backend Docker image
        run: |
          cd backend
          docker build -t ticket-backend:ci .
